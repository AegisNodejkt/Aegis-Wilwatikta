name: 'AI Code Reviewer'
description: 'Runs the Aegis-Wilwatikta AI code reviewer.'

inputs:
  provider:
    description: 'AI provider to use (gemini or openai)'
    required: true
    default: 'openai'
  platform:
    description: 'Platform to run the reviewer on (github)'
    required: true
    default: 'github'
  github_token:
    description: 'GitHub token for API access'
    required: true
  openai_api_key:
    description: 'API key for OpenAI'
    required: false
  gemini_api_key:
    description: 'API key for Gemini'
    required: false
  neo4j_uri:
    description: 'Neo4j connection URI'
    required: false
  neo4j_user:
    description: 'Neo4j username'
    required: false
  neo4j_pass:
    description: 'Neo4j password'
    required: false
  neo4j_database:
    description: 'Neo4j database name'
    required: false
  repository_name:
    description: 'Repository name (owner/repo)'
    required: false
  pr_number:
    description: 'Pull Request number'
    required: false
  scout_model:
    description: 'Scout model name'
    required: false
  arch_model:
    description: 'Architect model name'
    required: false
  dip_model:
    description: 'Diplomat model name'
    required: false
  embedding_provider:
    description: 'Embedding provider name'
    required: false

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.github_token }}
    GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    PROVIDER: ${{ inputs.provider }}
    PLATFORM: ${{ inputs.platform }}
    REPOSITORY_NAME: ${{ inputs.repository_name }}
    PR_NUMBER: ${{ inputs.pr_number }}
    NEO4J_URI: ${{ inputs.neo4j_uri }}
    NEO4J_USER: ${{ inputs.neo4j_user }}
    NEO4J_PASS: ${{ inputs.neo4j_pass }}
    NEO4J_DATABASE: ${{ inputs.neo4j_database }}
    SCOUT_MODEL: ${{ inputs.scout_model }}
    ARCH_MODEL: ${{ inputs.arch_model }}
    DIP_MODEL: ${{ inputs.dip_model }}
    
