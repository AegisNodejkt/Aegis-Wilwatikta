name: Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Agar build juga jalan saat Anda buat tag release

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Langkah krusial: Mengubah nama repo menjadi lowercase
      - name: Set Image Names to Lowercase
        run: |
          echo "IMAGE_CLI=ghcr.io/${{ github.repository_owner }}/aegis-cli" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV
          echo "IMAGE_INDEXER=ghcr.io/${{ github.repository_owner }}/aegis-indexer" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_CLI }}
            ${{ env.IMAGE_INDEXER }}

      - name: Build and push CLI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Menggunakan variabel env yang sudah lowercase
          tags: ${{ env.IMAGE_CLI }}:latest, ${{ env.IMAGE_CLI }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Indexer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.indexer
          push: true
          # Menggunakan variabel env yang sudah lowercase
          tags: ${{ env.IMAGE_INDEXER }}:latest, ${{ env.IMAGE_INDEXER }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI binary
        run: go build -v -o aegis-reviewer ./cmd/cli

      - name: Build Indexer binary
        run: go build -v -o aegis-indexer ./cmd/indexer

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-binaries
          path: |
            ./aegis-reviewer
            ./aegis-indexer
          retention-days: 7 # Hemat kuota dengan menyimpan hanya 7 hari
