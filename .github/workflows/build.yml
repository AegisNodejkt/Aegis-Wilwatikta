name: Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Dynamic Image Names (Lowercase)
        run: |
          # Mengambil nama repo secara dinamis dan mengubah ke lowercase
          REPO_NAME_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_CLI=ghcr.io/${REPO_NAME_LC}-cli" >> $GITHUB_ENV
          echo "IMAGE_INDEXER=ghcr.io/${REPO_NAME_LC}-indexer" >> $GITHUB_ENV
          echo "BINARY_NAME_BASE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_CLI }}
            ${{ env.IMAGE_INDEXER }}

      - name: Build and push CLI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_CLI }}:latest, ${{ env.IMAGE_CLI }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Indexer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.indexer
          push: true
          tags: ${{ env.IMAGE_INDEXER }}:latest, ${{ env.IMAGE_INDEXER }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Dynamic Binary Names
        run: |
          # Membuat nama binary berdasarkan nama repo
          RAW_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "BIN_CLI=${RAW_NAME}-reviewer" >> $GITHUB_ENV
          echo "BIN_INDEXER=${RAW_NAME}-indexer" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${RAW_NAME}-binaries" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI binary
        run: go build -v -o ${{ env.BIN_CLI }} ./cmd/cli

      - name: Build Indexer binary
        run: go build -v -o ${{ env.BIN_INDEXER }} ./cmd/indexer

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ./${{ env.BIN_CLI }}
            ./${{ env.BIN_INDEXER }}
          retention-days: 7
